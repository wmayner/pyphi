exclude: "^$"
fail_fast: false

ci:
  autofix_commit_msg: "[pre-commit.ci] auto fixes from pre-commit hooks"
  autofix_prs: true
  autoupdate_branch: "main"
  autoupdate_commit_msg: "[pre-commit.ci] pre-commit autoupdate"
  autoupdate_schedule: monthly
  skip: []

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-added-large-files
        exclude: ^(papers/|graphify-out/)
      - id: debug-statements
      # Skip generated assets (SVG), test data and goldens, and vendored
      # scripts: these should not be whitespace-normalized by lint hooks.
      - id: end-of-file-fixer
        exclude: '(^test/data/|^profiling/|\.svg$)'
      - id: trailing-whitespace
        exclude: '(^test/data/|^profiling/|\.svg$)'

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.10
    hooks:
      # Run the linter
      - id: ruff-check
        args: [--fix]
      # Run the formatter
      - id: ruff-format

  - repo: https://github.com/RobertCraigie/pyright-python
    rev: v1.1.407
    hooks:
      - id: pyright
        additional_dependencies: [types-PyYAML, numpy, pandas]

  - repo: https://github.com/twisted/towncrier
    rev: 24.8.0
    hooks:
      - id: towncrier-check
