# DEPRECATED: This file is no longer maintained.
#
# PyPhi has migrated to uv for package management. Please use uv instead:
#
#   # Install uv
#   curl -LsSf https://astral.sh/uv/install.sh | sh
#
#   # Create virtual environment
#   uv venv
#
#   # Install PyPhi with all dependencies
#   uv pip install -e ".[dev,parallel,visualize,graphs,emd,caching]"
#
#   # For JupyterLab (what this environment.yml was mainly used for):
#   uv pip install jupyterlab jupyterlab-lsp python-lsp-server ipywidgets
#
# See MIGRATION.md for more details on migrating from conda to uv.
#
# This file is kept for reference but will be removed in a future release.

name: pyphi
channels:
  - conda-forge
dependencies:
  - blackcellmagic
  - ipywidgets
  - jupyterlab
  - jupyterlab-lsp
  - python-lsp-server
  - nodejs
  - python=3.11
  - pip
  - pip:
      - -r requirements.txt
